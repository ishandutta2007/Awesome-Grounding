<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
    
    <!-- Title Gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Tech Accents / Glowing Orbs -->
  <circle cx="200" cy="100" r="120" fill="#3B82F6" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="150" fill="#EC4899" opacity="0.12" filter="url(#glow)" />
  <circle cx="600" cy="200" r="80" fill="#8B5CF6" opacity="0.1" filter="url(#glow)" />

  <!-- Connecting Lines (representing Grounding/Graphs) -->
  <g stroke="#4B5563" stroke-width="1.5" opacity="0.4">
    <line x1="150" y1="200" x2="300" y2="120" />
    <line x1="300" y1="120" x2="500" y2="250" />
    <line x1="500" y1="250" x2="700" y2="150" />
    <line x1="700" y1="150" x2="900" y2="280" />
    <line x1="900" y1="280" x2="1050" y2="180" />
  </g>
  
  <g fill="#8B5CF6" opacity="0.7">
    <circle cx="150" cy="200" r="6" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="300" cy="120" r="8" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="500" cy="250" r="10" fill="#EC4899" filter="url(#glow)"/>
    <circle cx="700" cy="150" r="7" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="900" cy="280" r="9" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="1050" cy="180" r="6" fill="#EC4899" filter="url(#glow)"/>
  </g>

  <!-- Title & Subtitle -->
  <g text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif">
    <text x="600" y="190" font-size="72" font-weight="900" fill="url(#titleGrad)" letter-spacing="4">AWESOME GROUNDING</text>
    <text x="600" y="240" font-size="20" font-weight="400" fill="#9CA3AF" letter-spacing="6">Anchoring AI Outputs to Verifiable Truth</text>
  </g>
  
  <!-- Sleek Border Accent -->
  <rect x="15" y="15" width="1170" height="370" fill="none" stroke="#374151" stroke-width="2" rx="10" opacity="0.5" />
</svg>
